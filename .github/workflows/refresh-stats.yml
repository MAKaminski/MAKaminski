# Refreshes GitHub profile stats (viewcount, contributions, issues, PRs, etc.)
# by fetching from external APIs and committing SVGs to the repo.
# README references these local assets for reliable, up-to-date display.
#
# Schedule: every 10 minutes to reduce upstream 5xx/rate-limit failures
# Manual: workflow_dispatch
#
# Upstream SVG hosts (Vercel/Heroku) often return 503 under load; curl retries
# reduce spurious workflow failures.

name: Refresh Profile Stats

on:
  schedule:
    - cron: "*/10 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/refresh-stats.yml"
  workflow_dispatch:

concurrency:
  group: refresh-profile-stats
  cancel-in-progress: true

jobs:
  refresh_depot:
    runs-on: depot-ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    outputs:
      depot_refresh_succeeded: ${{ steps.depot_result.outputs.succeeded }}
      depot_failure_reason: ${{ steps.depot_result.outputs.reason }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets directory
        run: mkdir -p assets/stats

      - name: Validate Depot token availability
        id: depot_token
        env:
          DEPOT_TOKEN: ${{ secrets.DEPOT_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${DEPOT_TOKEN:-}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run refresh on Depot runner
        id: depot_refresh
        if: ${{ steps.depot_token.outputs.available == 'true' }}
        continue-on-error: true
        env:
          REFRESH_EXECUTION_MODE: depot
        run: |
          set -euo pipefail
          bash ./scripts/refresh_profile_stats.sh

      - name: Compute Depot result
        id: depot_result
        run: |
          set -euo pipefail
          succeeded="false"
          reason="Depot job did not execute"
          if [ "${{ steps.depot_token.outputs.available }}" != "true" ]; then
            reason="DEPOT_TOKEN secret is missing"
          elif [ "${{ steps.depot_refresh.outcome }}" = "success" ]; then
            succeeded="true"
            reason="none"
          elif [ "${{ steps.depot_refresh.outcome }}" = "failure" ]; then
            reason="Depot runner execution failed"
          elif [ "${{ steps.depot_refresh.outcome }}" = "cancelled" ]; then
            reason="Depot runner execution cancelled"
          else
            reason="Depot runner execution unavailable"
          fi
          echo "succeeded=${succeeded}" >> "$GITHUB_OUTPUT"
          echo "reason=${reason}" >> "$GITHUB_OUTPUT"
          if [ "$succeeded" = "true" ]; then
            {
              echo "## Depot status"
              echo ""
              echo ":white_check_mark: Depot runner refresh succeeded."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::DEPOT_FALLBACK_ACTIVE: ${reason}. GitHub-hosted fallback job will run."
          fi

  refresh_github_fallback:
    runs-on: ubuntu-latest
    needs: [refresh_depot]
    if: ${{ always() && (needs.refresh_depot.result != 'success' || needs.refresh_depot.outputs.depot_refresh_succeeded != 'true') }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create assets directory
        run: mkdir -p assets/stats

      - name: Run refresh on GitHub-hosted fallback runner
        env:
          REFRESH_EXECUTION_MODE: github_fallback
        run: |
          set -euo pipefail
          bash ./scripts/refresh_profile_stats.sh

      - name: Raise Depot fallback alarm
        run: |
          set -euo pipefail
          reason="${{ needs.refresh_depot.outputs.depot_failure_reason }}"
          if [ -z "$reason" ] || [ "$reason" = "none" ]; then
            reason="Depot runner unavailable (job result: ${{ needs.refresh_depot.result }})"
          fi
          echo "::warning::DEPOT_FALLBACK_ACTIVE: ${reason}. Refresh completed via GitHub-hosted runner."
          {
            echo "## Depot status"
            echo ""
            echo ":warning: **DEPOT_FALLBACK_ACTIVE**"
            echo ""
            echo "- Reason: ${reason}"
            echo "- Action: Fallback refresh executed on GitHub-hosted runner"
            echo "- Check: `DEPOT_TOKEN` secret validity and Depot plan/status"
          } >> "$GITHUB_STEP_SUMMARY"
