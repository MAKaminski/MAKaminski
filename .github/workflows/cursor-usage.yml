# Fetches Cursor usage from the Analytics API (Enterprise) and appends to SQLite.
# Runs hourly. Requires CURSOR_API_KEY secret (Admin API key from cursor.com/dashboard).
#
# Implemented in Rust (cursor-usage/). Data: data/cursor_usage.db (SQLite),
# data/cursor_usage_latest.json (summary for badges). Schema supports project
# allocation and graphing.

name: Cursor Usage Tracker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cursor-usage

      - name: Build cursor-usage (release)
        run: cargo build --release --manifest-path cursor-usage/Cargo.toml

      - name: Fetch Cursor usage and update DB
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: ./cursor-usage/target/release/cursor-usage
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Cursor usage snapshot [automated]"
            git push
          fi
